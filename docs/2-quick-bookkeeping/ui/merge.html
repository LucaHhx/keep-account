<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Account -- 快速记账 (响应式三端)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2563EB', light: '#DBEAFE', 50: '#EFF6FF', 100: '#DBEAFE', 500: '#3B82F6', 600: '#2563EB', 700: '#1D4ED8' },
            income: { DEFAULT: '#16A34A', 50: '#F0FDF4', 100: '#DCFCE7', 600: '#16A34A', 700: '#15803D' },
            expense: { DEFAULT: '#EF4444', 50: '#FEF2F2' },
            surface: { DEFAULT: '#FFFFFF', secondary: '#F9FAFB' },
          },
          fontFamily: { sans: ['Inter', '"PingFang SC"', '"Noto Sans SC"', 'system-ui', 'sans-serif'] },
        },
      },
    }
    function toggleDark() { document.documentElement.classList.toggle('dark'); }
  </script>
  <style>
    body { font-family: 'Inter', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <!-- Dark Mode Toggle (预览用) -->
  <button onclick="toggleDark()" class="fixed top-4 right-4 z-50 w-10 h-10 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full flex items-center justify-center cursor-pointer shadow-sm hover:shadow transition-all duration-200">
    <svg class="dark:hidden" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg class="hidden dark:block" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#fbbf24" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>

  <div class="flex min-h-screen">

    <!-- ===== 桌面端侧边栏导航 (lg+) ===== -->
    <nav class="hidden lg:flex flex-col w-56 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 py-6 px-3 shrink-0">
      <!-- Logo -->
      <div class="flex items-center gap-3 px-3 mb-8">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shrink-0">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        </div>
        <div>
          <div class="font-semibold text-gray-900 dark:text-gray-50 text-sm">记账本</div>
          <div class="text-xs text-gray-400">Keep Account</div>
        </div>
      </div>

      <!-- Nav Items -->
      <div class="space-y-1">
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 cursor-pointer">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span class="text-sm font-medium">记账</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors duration-150">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          <span class="text-sm">流水</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors duration-150">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 118 2.83"/><path d="M22 12A10 10 0 0012 2v10z"/></svg>
          <span class="text-sm">报表</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors duration-150">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="text-sm">我的</span>
        </a>
      </div>

      <!-- Bottom User Info -->
      <div class="mt-auto pt-4 border-t border-gray-200 dark:border-gray-700 mx-3">
        <div class="flex items-center gap-3 px-0 py-2">
          <div class="w-8 h-8 bg-blue-100 dark:bg-blue-900/50 rounded-full flex items-center justify-center shrink-0">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="min-w-0">
            <div class="text-sm font-medium text-gray-900 dark:text-gray-50 truncate">xiaoming</div>
            <div class="text-xs text-gray-400 truncate">已登录</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===== 主内容区 ===== -->
    <main class="flex-1 flex flex-col min-h-screen">

      <!-- 桌面端顶部标题栏 (lg+) -->
      <header class="hidden lg:flex items-center justify-between px-8 py-5 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
        <div>
          <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-50">快速记账</h1>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">记录每一笔收支</p>
        </div>
        <div class="text-sm text-gray-500 dark:text-gray-400">2026年2月28日 周六</div>
      </header>

      <!-- 内容区域: 桌面双栏 / 平板居中 / 手机全宽 -->
      <div class="flex-1 flex flex-col lg:flex-row lg:gap-6 lg:p-8 overflow-auto">

        <!-- ===== 左栏: 记账表单 ===== -->
        <div class="flex-1 flex flex-col lg:max-w-xl">

          <!-- 表单卡片: 桌面端有卡片样式，移动端无 -->
          <div class="flex-1 flex flex-col lg:bg-white lg:dark:bg-gray-800 lg:rounded-2xl lg:shadow-sm lg:border lg:border-gray-200 lg:dark:border-gray-700 lg:overflow-hidden">

            <!-- Type Tabs -->
            <div class="px-4 pt-4 md:px-6 md:pt-6">
              <div class="flex bg-gray-100 dark:bg-gray-800 lg:dark:bg-gray-700 rounded-lg p-1">
                <button class="flex-1 py-2.5 text-sm font-medium bg-white dark:bg-gray-700 lg:dark:bg-gray-600 rounded-md shadow-sm text-gray-900 dark:text-gray-50 cursor-pointer">支出</button>
                <button class="flex-1 py-2.5 text-sm font-medium text-gray-500 dark:text-gray-400 rounded-md cursor-pointer hover:text-gray-700 dark:hover:text-gray-300 transition-colors duration-150">收入</button>
                <button class="flex-1 py-2.5 text-sm font-medium text-gray-500 dark:text-gray-400 rounded-md cursor-pointer hover:text-gray-700 dark:hover:text-gray-300 transition-colors duration-150">转账</button>
              </div>
            </div>

            <!-- Amount Input -->
            <div class="px-6 pt-6 md:pt-8 pb-4 md:pb-6 text-center">
              <div class="text-sm text-gray-500 dark:text-gray-400 mb-2">支出金额</div>
              <div class="flex items-center justify-center">
                <span class="text-2xl md:text-3xl text-gray-400 dark:text-gray-500 mr-1">&yen;</span>
                <input type="number" inputmode="decimal" placeholder="0.00" value="38.50"
                  class="text-5xl md:text-6xl font-semibold text-gray-900 dark:text-gray-50 tracking-tight text-center bg-transparent outline-none w-48 md:w-56 placeholder-gray-300 dark:placeholder-gray-600">
              </div>
            </div>

            <!-- Category Grid: 手机5列, 平板6列, 桌面5列 -->
            <div class="px-4 md:px-6 pb-3">
              <div class="text-xs text-gray-500 dark:text-gray-400 mb-2 px-1">选择分类</div>
              <div class="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-5 gap-2 md:gap-3">
                <!-- 餐饮 - selected -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 border-2 border-blue-500 cursor-pointer">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-100 dark:bg-blue-800/50 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>
                  </div>
                  <span class="text-xs text-blue-700 dark:text-blue-300 font-medium">餐饮</span>
                </div>
                <!-- 购物 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">购物</span>
                </div>
                <!-- 交通 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v5h-7V8z"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">交通</span>
                </div>
                <!-- 娱乐 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M12 12h.01M18 12h.01"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">娱乐</span>
                </div>
                <!-- 医疗 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">医疗</span>
                </div>
                <!-- 教育 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">教育</span>
                </div>
                <!-- 日常 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">日常</span>
                </div>
                <!-- 住房 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">住房</span>
                </div>
                <!-- 通讯 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">通讯</span>
                </div>
                <!-- 其他 -->
                <div class="flex flex-col items-center py-2 md:py-3 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-150">
                  <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                  </div>
                  <span class="text-xs text-gray-600 dark:text-gray-400">其他</span>
                </div>
              </div>
            </div>

            <!-- Note & Date -->
            <div class="px-4 md:px-6 pb-3 flex items-center gap-3">
              <div class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-800 lg:bg-gray-50 lg:dark:bg-gray-700 rounded-lg px-3 py-2.5 border border-gray-200 dark:border-gray-700">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                <input type="text" placeholder="添加备注" class="flex-1 text-sm text-gray-900 dark:text-gray-50 placeholder-gray-400 dark:placeholder-gray-500 outline-none bg-transparent">
              </div>
              <div class="flex items-center gap-1.5 bg-white dark:bg-gray-800 lg:bg-gray-50 lg:dark:bg-gray-700 rounded-lg px-3 py-2.5 border border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors duration-150">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <span class="text-sm text-gray-600 dark:text-gray-400">今天</span>
              </div>
            </div>

            <!-- Save Button -->
            <div class="mt-auto px-4 md:px-6 pb-4 md:pb-6 lg:pt-2">
              <button class="w-full h-12 bg-blue-600 dark:bg-blue-500 text-white font-medium rounded-lg cursor-pointer transition-colors duration-200 hover:bg-blue-700 dark:hover:bg-blue-400 active:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">
                保存
              </button>
            </div>

          </div>
        </div>

        <!-- ===== 右栏: 最近流水 (仅桌面端显示) ===== -->
        <div class="hidden lg:block w-80 xl:w-96 shrink-0">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden h-full">
            <!-- Header -->
            <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
              <h2 class="text-sm font-semibold text-gray-900 dark:text-gray-50">最近记录</h2>
              <a class="text-xs text-blue-600 dark:text-blue-400 cursor-pointer hover:underline">查看全部</a>
            </div>

            <!-- Today's Records -->
            <div class="px-5 pt-4">
              <div class="text-xs text-gray-400 dark:text-gray-500 mb-3">今天</div>

              <!-- Record 1 -->
              <div class="flex items-center gap-3 py-3 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 -mx-5 px-5 transition-colors duration-150">
                <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center shrink-0">
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-gray-900 dark:text-gray-50">餐饮</div>
                  <div class="text-xs text-gray-400 dark:text-gray-500 truncate">午餐</div>
                </div>
                <div class="text-sm font-medium text-red-500">-38.50</div>
              </div>

              <!-- Record 2 -->
              <div class="flex items-center gap-3 py-3 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 -mx-5 px-5 transition-colors duration-150">
                <div class="w-10 h-10 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center shrink-0">
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v5h-7V8z"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-gray-900 dark:text-gray-50">交通</div>
                  <div class="text-xs text-gray-400 dark:text-gray-500 truncate">地铁</div>
                </div>
                <div class="text-sm font-medium text-red-500">-6.00</div>
              </div>

              <!-- Record 3 -->
              <div class="flex items-center gap-3 py-3 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 -mx-5 px-5 transition-colors duration-150">
                <div class="w-10 h-10 bg-green-50 dark:bg-green-900/30 rounded-full flex items-center justify-center shrink-0">
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#16A34A" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-gray-900 dark:text-gray-50">工资</div>
                  <div class="text-xs text-gray-400 dark:text-gray-500 truncate">2月工资</div>
                </div>
                <div class="text-sm font-medium text-green-600 dark:text-green-400">+8000.00</div>
              </div>
            </div>

            <!-- Yesterday's Records -->
            <div class="px-5 pt-4">
              <div class="text-xs text-gray-400 dark:text-gray-500 mb-3">昨天</div>

              <div class="flex items-center gap-3 py-3 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 -mx-5 px-5 transition-colors duration-150">
                <div class="w-10 h-10 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center shrink-0">
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-gray-900 dark:text-gray-50">购物</div>
                  <div class="text-xs text-gray-400 dark:text-gray-500 truncate">日用品</div>
                </div>
